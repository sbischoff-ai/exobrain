procs:
  model-provider:
    shell: ./scripts/local/run-model-provider.sh
  assistant-backend:
    shell: ./scripts/local/run-assistant-backend.sh
  knowledge-interface:
    shell: >-
      bash -lc 'until curl --silent --fail http://127.0.0.1:8010/healthz >/dev/null; do
      echo "waiting for model-provider at http://127.0.0.1:8010/healthz"; sleep 1; done;
      exec ./scripts/local/run-knowledge-interface.sh'
  job-orchestrator:
    shell: ./scripts/local/run-job-orchestrator.sh
  assistant-frontend:
    shell: ./scripts/local/run-assistant-frontend.sh
