syntax = "proto3";

package exobrain.knowledge.v1;


service KnowledgeInterface {
  rpc Health(HealthRequest) returns (HealthReply);
  rpc GetSchema(GetSchemaRequest) returns (GetSchemaReply);
  rpc GetUpsertGraphDeltaJsonSchema(GetUpsertGraphDeltaJsonSchemaRequest) returns (GetUpsertGraphDeltaJsonSchemaReply);
  rpc GetEntityExtractionSchemaContext(GetEntityExtractionSchemaContextRequest) returns (GetEntityExtractionSchemaContextReply);
  rpc GetEdgeExtractionSchemaContext(GetEdgeExtractionSchemaContextRequest) returns (GetEdgeExtractionSchemaContextReply);
  rpc GetEntityTypePropertyContext(GetEntityTypePropertyContextRequest) returns (GetEntityTypePropertyContextReply);
  rpc UpsertSchemaType(UpsertSchemaTypeRequest) returns (UpsertSchemaTypeReply);
  rpc UpsertGraphDelta(UpsertGraphDeltaRequest) returns (UpsertGraphDeltaReply);
  rpc GetUserInitGraph(GetUserInitGraphRequest) returns (GetUserInitGraphReply);
  rpc FindEntityCandidates(FindEntityCandidatesRequest) returns (FindEntityCandidatesReply);
  rpc ListEntitiesByType(ListEntitiesByTypeRequest) returns (ListEntitiesByTypeReply);
  rpc GetEntityContext(GetEntityContextRequest) returns (GetEntityContextReply);
}

message HealthRequest {}
message HealthReply { string status = 1; }
message GetSchemaRequest { string universe_id = 1; }

message SchemaType {
  string id = 1;
  string kind = 2;
  string name = 3;
  string description = 4;
  bool active = 5;
}

message TypeInheritance {
  string child_type_id = 1;
  string parent_type_id = 2;
  string description = 3;
  bool active = 4;
}

message TypeProperty {
  string owner_type_id = 1;
  string prop_name = 2;
  string value_type = 3;
  bool required = 4;
  bool readable = 5;
  bool writable = 6;
  bool active = 7;
  string description = 8;
}

message EdgeEndpointRule {
  string edge_type_id = 1;
  string from_node_type_id = 2;
  string to_node_type_id = 3;
  bool active = 4;
  string description = 5;
}

message SchemaNodeType {
  SchemaType type = 1;
  repeated TypeProperty properties = 2;
  repeated TypeInheritance parents = 3;
}

message SchemaEdgeType {
  SchemaType type = 1;
  repeated TypeProperty properties = 2;
  repeated EdgeEndpointRule rules = 3;
}

message GetSchemaReply {
  repeated SchemaNodeType node_types = 1;
  repeated SchemaEdgeType edge_types = 2;
}

message GetUpsertGraphDeltaJsonSchemaRequest {}

message GetUpsertGraphDeltaJsonSchemaReply {
  string json_schema = 1;
  optional string schema_id = 2;
  optional string draft = 3;
  optional string version = 4;
}

message GetEntityExtractionSchemaContextRequest {
  optional bool include_inactive = 2;
  string user_id = 3;
}

message GetEdgeExtractionSchemaContextRequest {
  string first_entity_type = 1;
  string second_entity_type = 2;
  optional bool include_inactive = 3;
  string user_id = 4;
}

message ExtractionEdgeType {
  string edge_type_id = 1;
  string edge_name = 2;
  string edge_description = 3;
  string source_entity_type_id = 4;
  string target_entity_type_id = 5;
}

message ExtractionEntityType {
  string type_id = 1;
  string name = 2;
  string description = 3;
  repeated string inheritance_chain = 4;
}

message GetEntityExtractionSchemaContextReply {
  repeated ExtractionEntityType entity_types = 1;
  repeated ExtractionUniverse universes = 2;
}

message GetEdgeExtractionSchemaContextReply {
  string first_entity_type = 1;
  string second_entity_type = 2;
  repeated ExtractionEdgeType edge_types = 3;
}

message GetEntityTypePropertyContextRequest {
  string type_id = 1;
  optional bool include_inactive = 2;
  optional bool include_inherited = 3;
  optional string user_id = 4;
}

message PropertyContext {
  string prop_name = 1;
  string value_type = 2;
  bool required = 3;
  bool readable = 4;
  bool writable = 5;
  string description = 6;
  string declared_on_type_id = 7;
}

message GetEntityTypePropertyContextReply {
  string type_id = 1;
  string type_name = 2;
  repeated string inheritance_chain = 3;
  repeated PropertyContext properties = 4;
}

message ExtractionUniverse {
  string id = 1;
  string name = 2;
  optional string described_by_text = 3;
}


message UpsertSchemaTypeProperty {
  string prop_name = 1;
  string value_type = 2;
  bool required = 3;
  bool readable = 4;
  bool writable = 5;
  bool active = 6;
  string description = 7;
}

message UpsertSchemaTypeRequest {
  string id = 1;
  string kind = 2;
  string name = 3;
  string description = 4;
  bool active = 5;
  optional string parent_type_id = 6;
  repeated UpsertSchemaTypeProperty properties = 7;
}

message UpsertSchemaTypeReply { SchemaType schema_type = 1; }

message PropertyValue {
  string key = 1;
  oneof value {
    string string_value = 2;
    double float_value = 3;
    int64 int_value = 4;
    bool bool_value = 5;
    string datetime_value = 6;
    string json_value = 7;
  }
}

enum Visibility {
  VISIBILITY_UNSPECIFIED = 0;
  PRIVATE = 1;
  SHARED = 2;
}

message UniverseNode {
  string id = 1;
  string name = 2;
  string user_id = 3;
  Visibility visibility = 4;
}

message EntityNode {
  string id = 1;
  string type_id = 2;
  optional string universe_id = 3;
  repeated PropertyValue properties = 4;
  string user_id = 5;
  Visibility visibility = 6;
}

message BlockNode {
  string id = 1;
  string type_id = 2;
  repeated PropertyValue properties = 3;
  string user_id = 4;
  Visibility visibility = 5;
}

message GraphEdge {
  string from_id = 1;
  string to_id = 2;
  string edge_type = 3;
  repeated PropertyValue properties = 4;
  string user_id = 5;
  Visibility visibility = 6;
}

message UpsertGraphDeltaRequest {
  repeated UniverseNode universes = 1;
  repeated EntityNode entities = 2;
  repeated BlockNode blocks = 3;
  repeated GraphEdge edges = 4;
}

message UpsertGraphDeltaReply {
  uint32 entities_upserted = 1;
  uint32 blocks_upserted = 2;
  uint32 edges_upserted = 3;
}

message GetUserInitGraphRequest {
  string user_id = 1;
  string user_name = 2;
}

message GetUserInitGraphReply {
  string person_entity_id = 1;
  string assistant_entity_id = 2;
}

message FindEntityCandidatesRequest {
  repeated string names = 1;
  repeated string potential_type_ids = 2;
  string short_description = 3;
  string user_id = 4;
  optional uint32 limit = 5;
}

message EntityCandidate {
  string entity_id = 1;
  string entity_name = 2;
  string described_by_text = 3;
  double score = 4;
  string matched_name = 5;
  string matched_alias = 6;
  string entity_type_id = 7;
}

message FindEntityCandidatesReply {
  repeated EntityCandidate candidates = 1;
}

message ListEntitiesByTypeRequest {
  string user_id = 1;
  string type_id = 2;
  optional uint32 page_size = 3;
  optional string page_token = 4;
}

message ListEntitiesByTypeItem {
  string id = 1;
  string name = 2;
  optional string updated_at = 3;
  optional string description = 4;
  optional double score = 5;
}

message ListEntitiesByTypeReply {
  repeated ListEntitiesByTypeItem entities = 1;
  optional string next_page_token = 2;
  optional uint32 total_count = 3;
}

message GetEntityContextRequest {
  string entity_id = 1;
  string user_id = 2;
  uint32 max_block_level = 3;
}

message EntityContextCore {
  string id = 1;
  string type_id = 2;
  string user_id = 3;
  Visibility visibility = 4;
  optional string name = 5;
  repeated string aliases = 6;
  optional string created_at = 7;
  optional string updated_at = 8;
}

message EntityContextOtherEntity {
  string id = 1;
  optional string description = 2;
  optional string name = 3;
}

enum NeighborDirection {
  NEIGHBOR_DIRECTION_UNSPECIFIED = 0;
  OUTGOING = 1;
  INCOMING = 2;
}

message EntityContextNeighbor {
  NeighborDirection direction = 1;
  string edge_type = 2;
  map<string, string> properties = 3;
  EntityContextOtherEntity other_entity = 4;
}

message EntityContextBlock {
  string id = 1;
  string type_id = 2;
  uint32 block_level = 3;
  map<string, string> properties = 4;
  optional string parent_block_id = 5;
  optional string text = 6;
  optional string created_at = 7;
  optional string updated_at = 8;
  repeated EntityContextNeighbor neighbors = 9;
}

message GetEntityContextReply {
  EntityContextCore entity = 1;
  map<string, string> entity_properties = 2;
  repeated EntityContextBlock blocks = 3;
  repeated EntityContextNeighbor neighbors = 4;
}
