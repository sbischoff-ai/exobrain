apiVersion: apps/v1
kind: Deployment
metadata:
  name: exobrain-mcp-server
  labels:
    app.kubernetes.io/name: exobrain-mcp-server
    {{- include "exobrain-stack.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.mcpServer.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: exobrain-mcp-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: exobrain-mcp-server
    spec:
      containers:
        - name: mcp-server
          image: "{{ .Values.mcpServer.image.repository }}:{{ .Values.mcpServer.image.tag }}"
          imagePullPolicy: {{ .Values.mcpServer.image.pullPolicy }}
          env:
            - name: APP_ENV
              value: {{ .Values.mcpServer.env.APP_ENV | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.mcpServer.env.LOG_LEVEL | quote }}
          ports:
            - containerPort: {{ .Values.mcpServer.service.port }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.mcpServer.service.port }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.mcpServer.service.port }}
          resources: {{- toYaml .Values.mcpServer.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: exobrain-mcp-server
  labels:
    app.kubernetes.io/name: exobrain-mcp-server
    {{- include "exobrain-stack.labels" . | nindent 4 }}
spec:
  type: {{ .Values.mcpServer.service.type }}
  selector:
    app.kubernetes.io/name: exobrain-mcp-server
  ports:
    - name: http
      port: {{ .Values.mcpServer.service.port }}
      targetPort: {{ .Values.mcpServer.service.port }}
