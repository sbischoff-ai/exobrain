[[actions]]
type = "custom"
complete = """
ALTER TABLE user_config_definitions
ADD CONSTRAINT user_config_definitions_type_check
CHECK (config_type IN ('boolean', 'choice'));

ALTER TABLE user_config_definitions
ADD CONSTRAINT user_config_definitions_default_value_shape_check
CHECK (
  jsonb_typeof(default_value) = 'object'
  AND default_value ? 'kind'
  AND default_value ? 'value'
  AND default_value->>'kind' = config_type
  AND (
    (config_type = 'boolean' AND jsonb_typeof(default_value->'value') = 'boolean')
    OR (config_type = 'choice' AND jsonb_typeof(default_value->'value') = 'string')
  )
);

ALTER TABLE user_config_choice_options
ADD CONSTRAINT user_config_choice_options_non_empty_value_check
CHECK (length(trim(option_value)) > 0);

ALTER TABLE user_config_values
ADD CONSTRAINT user_config_values_value_shape_check
CHECK (
  jsonb_typeof(value) = 'object'
  AND value ? 'kind'
  AND value ? 'value'
  AND (
    (value->>'kind' = 'boolean' AND jsonb_typeof(value->'value') = 'boolean')
    OR (value->>'kind' = 'choice' AND jsonb_typeof(value->'value') = 'string')
  )
);
"""
